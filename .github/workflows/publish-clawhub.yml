# Publishes the Cabgo MCP operator skill to ClawHub
# (https://clawhub.ai/skills) on every push to main, and lets us run a
# dry-run from the Actions tab before committing breaking changes.
#
# Setup (one-time):
#   1. Create a publish token at https://clawhub.ai → Account settings
#      → API tokens. Choose an org token if "cabgoapp" is registered as
#      an organization owner; otherwise use your personal token.
#   2. Add it as repo secret CLAWHUB_TOKEN.
#   3. Optional: change the OWNER input below if Cabgo's ClawHub handle
#      differs from "cabgoapp".
#
# What ClawHub does on publish:
#   - Validates the SKILL.md frontmatter (name, version, description,
#     metadata.openclaw)
#   - Runs automated security checks on the markdown body + supporting
#     files
#   - Stores the release and may hold it back from install surfaces
#     until human review finishes. We don't block on that here — the
#     workflow's job is to push the bits.

name: Publish skill to ClawHub

on:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "README.md"
      - ".github/workflows/publish-clawhub.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: dry-run lets you see what would be published without uploading.
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - publish

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve dry-run flag
        id: flags
        env:
          MODE: ${{ inputs.mode }}
          EVENT: ${{ github.event_name }}
        run: |
          # workflow_dispatch lets the operator opt into a dry-run.
          # Push events always publish (we already know main is the
          # source of truth — gating with a dry-run would just stall).
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$MODE" = "dry-run" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync skill to ClawHub
        uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
        with:
          owner: cabgoapp
          # The single-skill repo doesn't follow the catalog layout
          # (skills/<slug>/SKILL.md); the repo root IS the skill folder,
          # so we sync the whole thing.
          dry_run: ${{ steps.flags.outputs.dry_run == 'true' }}
        secrets:
          clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
