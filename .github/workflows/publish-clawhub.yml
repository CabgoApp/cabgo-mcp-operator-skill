# Publishes the Cabgo MCP operator skill to ClawHub
# (https://clawhub.ai/skills) on every push to main, and lets us run a
# dry-run from the Actions tab before committing breaking changes.
#
# Setup (one-time): set repo secret CLAWHUB_TOKEN. Generate the token at
# https://clawhub.ai → account → API tokens; use an org token if the
# "cabgoapp" handle is registered as an organization owner there.
#
# Layout note: this repo is a SINGLE-skill repo (the skill files live in
# the root, not under skills/<slug>/). We make ClawHub happy by exposing
# the root as a skill_path; the reusable workflow accepts that shape.

name: Publish skill to ClawHub

on:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "README.md"
      - ".github/workflows/publish-clawhub.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: dry-run lets you see what would be published without uploading.
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - publish

permissions:
  contents: read
  id-token: write

jobs:
  # Reusable workflow calls live at jobs.<id>.uses — NOT inside steps.
  # Per GitHub Actions rules a job that uses a reusable workflow can't
  # also declare runs-on / steps; the whole job is the workflow_call.
  publish:
    uses: openclaw/clawhub/.github/workflows/skill-publish.yml@main
    with:
      owner: cabgoapp
      # The root of this repo IS the skill folder (single-skill repo, no
      # skills/<slug>/ layout). Point skill_path at "." so the reusable
      # workflow processes just this one instead of walking a catalog
      # tree.
      skill_path: "."
      # workflow_dispatch + mode=dry-run → preview; push or
      # mode=publish → live publish.
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_TOKEN }}
